<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bacco Bar - Magazzino</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="gestionale.css">
</head>
<body>

    <main class="app-container">
        <header class="top-bar">
            <div class="header-titles">
                <h1>Magazzino</h1>
                <p>Gestione scorte e consumi</p>
            </div>
            <div class="header-actions">
                <button id="btn-report" class="btn-secondary">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    Statistiche
                </button>
                <button id="btn-add-product" class="btn-primary">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                    Nuovo
                </button>
            </div>
        </header>

        <div id="alert-banner" class="alert-banner hidden">
            <div class="alert-icon-wrap">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <div class="alert-content">
                <strong>Scorte in esaurimento</strong>
                <span id="alert-list"></span>
            </div>
        </div>

        <div id="product-list" class="product-list">
            </div>
    </main>

    <div id="modal-product" class="modal hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-title">Gestisci Prodotto</h2>
                <button id="btn-cancel-icon" class="btn-icon-only">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="modal-body">
                <div class="image-upload-wrapper">
                    <img id="preview-img" src="" alt="Preview">
                    <label for="img-input" class="btn-upload">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Imposta Foto
                    </label>
                    <input type="file" id="img-input" accept="image/*" capture="environment" hidden>
                </div>

                <div class="form-group">
                    <label>Nome Prodotto</label>
                    <input type="text" id="input-name" class="form-control" placeholder="es. Caffè Izzo">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Giacenza</label>
                        <input type="number" id="input-qty" class="form-control" min="0">
                    </div>
                    <div class="form-group">
                        <label>Soglia Minima</label>
                        <input type="number" id="input-min-qty" class="form-control" min="0">
                    </div>
                </div>

                <div class="form-group">
                    <label>Categoria</label>
                    <select id="input-type" class="form-control">
                        <option value="Sfuso">Sfuso</option>
                        <option value="Bevanda">Bevanda</option>
                        <option value="Alcolico">Alcolico</option>
                    </select>
                </div>
            </div>

            <div class="modal-footer">
                <button id="btn-cancel" class="btn-secondary">Annulla</button>
                <button id="btn-save" class="btn-primary">Salva Modifiche</button>
            </div>
        </div>
    </div>

    <div id="modal-report" class="modal hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Prodotti Più Venduti</h2>
                <button id="btn-close-report" class="btn-icon-only">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="modal-body">
                <p class="text-muted" style="margin-bottom: 16px; font-size: 0.9rem;">Consumi registrati tramite lo scarico merci.</p>
                <div class="chart-container">
                    <canvas id="salesChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="gestionale.js"></script>
</body>
</html>
